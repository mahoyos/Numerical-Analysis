name: 🚨 Production Rollback (Panic Button)

on:
  workflow_dispatch:
    inputs:
      backend_image_tag:
        description: 'Backend Docker image tag/SHA to roll back to (leave empty to keep current)'
        required: false
        type: string
        default: ''
      frontend_image_tag:
        description: 'Frontend Docker image tag/SHA to roll back to (leave empty to keep current)'
        required: false
        type: string
        default: ''

jobs:
  validate-inputs:
    runs-on: ubuntu-latest
    steps:
      - name: Validate at least one tag is provided
        run: |
          if [ -z "${{ inputs.backend_image_tag }}" ] && [ -z "${{ inputs.frontend_image_tag }}" ]; then
            echo "::error::Debes especificar al menos un tag (backend o frontend) para hacer rollback."
            exit 1
          fi
          echo "::notice::Backend tag: ${{ inputs.backend_image_tag || '(sin cambio)' }}"
          echo "::notice::Frontend tag: ${{ inputs.frontend_image_tag || '(sin cambio)' }}"

  rollback-production:
    needs: validate-inputs
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"
          terraform_wrapper: false

      - name: Terraform Init (Production)
        working-directory: infra
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=production/terraform.tfstate" \
            -backend-config="region=us-east-1"

      - name: Determine Rollback Image URIs
        id: images
        working-directory: infra
        run: |
          DOCKER_USER="${{ vars.DOCKERHUB_USERNAME }}"

          # Backend: use provided tag, or keep current from Terraform state
          if [ -n "${{ inputs.backend_image_tag }}" ]; then
            BACKEND_URI="${DOCKER_USER}/numerical-analysis-backend:${{ inputs.backend_image_tag }}"
            echo "::notice::🔄 Rolling back BACKEND to: ${{ inputs.backend_image_tag }}"
          else
            BACKEND_URI=$(terraform state show aws_ecs_task_definition.app 2>/dev/null | grep -o '".*numerical-analysis.*backend:[^"]*"' | tr -d '"' || echo "${DOCKER_USER}/numerical-analysis-backend:latest")
            echo "::notice::⏸️ Backend: keeping current image"
          fi

          # Frontend: use provided tag, or keep current from Terraform state
          if [ -n "${{ inputs.frontend_image_tag }}" ]; then
            FRONTEND_URI="${DOCKER_USER}/numerical-analysis-frontend:${{ inputs.frontend_image_tag }}"
            echo "::notice::🔄 Rolling back FRONTEND to: ${{ inputs.frontend_image_tag }}"
          else
            FRONTEND_URI=$(terraform state show aws_ecs_task_definition.app 2>/dev/null | grep -o '".*numerical-analysis.*frontend:[^"]*"' | tr -d '"' || echo "${DOCKER_USER}/numerical-analysis-frontend:latest")
            echo "::notice::⏸️ Frontend: keeping current image"
          fi

          echo "backend_uri=${BACKEND_URI}" >> $GITHUB_OUTPUT
          echo "frontend_uri=${FRONTEND_URI}" >> $GITHUB_OUTPUT

      - name: Terraform Apply (Rollback)
        working-directory: infra
        env:
          TF_VAR_environment_name: production
          TF_VAR_lab_role_arn: ${{ vars.LAB_ROLE_ARN }}
          TF_VAR_vpc_id: ${{ vars.VPC_ID }}
        run: |
          SUBNET_LIST=$(echo "${{ vars.SUBNET_IDS }}" | \
            awk -F',' '{printf "["; for(i=1;i<=NF;i++){printf "\"%s\"%s",$i,(i<NF?",":"")}; printf "]"}')

          terraform apply -auto-approve \
            -var="backend_image_uri=${{ steps.images.outputs.backend_uri }}" \
            -var="frontend_image_uri=${{ steps.images.outputs.frontend_uri }}" \
            -var="subnet_ids=${SUBNET_LIST}"

      # NOTE: No "force-new-deployment" here! terraform apply already triggers
      # a rolling deployment when the task definition changes. Adding another
      # force-deploy would create competing deployments and cause timeouts.

      - name: Wait for Service Stability
        run: |
          echo "::notice::⏳ Waiting for ECS service to stabilize (max 5 min)..."
          # Poll manually with a timeout instead of using `aws ecs wait` which has a 10-min fixed timeout
          for i in $(seq 1 20); do
            STATUS=$(aws ecs describe-services \
              --cluster numerical-analysis-production-cluster \
              --services numerical-analysis-production-service \
              --region us-east-1 \
              --query 'services[0].deployments[?status==`PRIMARY`].rolloutState' \
              --output text)

            echo "Attempt $i/20 — Deployment status: $STATUS"

            if [ "$STATUS" = "COMPLETED" ]; then
              echo "::notice::✅ Rollback complete! Service is stable."
              exit 0
            fi

            if [ "$STATUS" = "FAILED" ]; then
              echo "::error::❌ Deployment failed!"
              exit 1
            fi

            sleep 15
          done

          echo "::warning::⚠️ Deployment did not stabilize in 5 minutes, but may still be in progress. Check ECS console."
          exit 0
