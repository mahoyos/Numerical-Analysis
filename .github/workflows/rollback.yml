name: 🚨 Production Rollback (Panic Button)

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: 'Docker image tag/SHA to roll back to (e.g. abc1234 or latest)'
        required: true
        type: string
      component:
        description: 'Which component to roll back'
        required: true
        type: choice
        options:
          - both
          - backend
          - frontend

jobs:
  rollback-production:
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.6"
          terraform_wrapper: false

      - name: Terraform Init (Production)
        working-directory: infra
        run: |
          terraform init -reconfigure \
            -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
            -backend-config="key=production/terraform.tfstate" \
            -backend-config="region=us-east-1"

      - name: Determine Rollback Image URIs
        id: images
        working-directory: infra
        run: |
          # Get current images from Terraform state
          CURRENT_BACKEND=$(terraform output -raw 2>/dev/null || echo "")
          
          ROLLBACK_TAG="${{ inputs.image_tag }}"
          COMPONENT="${{ inputs.component }}"
          DOCKER_USER="${{ vars.DOCKERHUB_USERNAME }}"

          if [ "$COMPONENT" = "backend" ] || [ "$COMPONENT" = "both" ]; then
            BACKEND_URI="${DOCKER_USER}/numerical-analysis-backend:${ROLLBACK_TAG}"
          else
            # Keep current backend — pull from Terraform state
            BACKEND_URI=$(terraform state show aws_ecs_task_definition.app 2>/dev/null | grep -o '".*numerical-analysis.*backend:[^"]*"' | tr -d '"' || echo "${DOCKER_USER}/numerical-analysis-backend:latest")
          fi

          if [ "$COMPONENT" = "frontend" ] || [ "$COMPONENT" = "both" ]; then
            FRONTEND_URI="${DOCKER_USER}/numerical-analysis-frontend:${ROLLBACK_TAG}"
          else
            # Keep current frontend — pull from Terraform state
            FRONTEND_URI=$(terraform state show aws_ecs_task_definition.app 2>/dev/null | grep -o '".*numerical-analysis.*frontend:[^"]*"' | tr -d '"' || echo "${DOCKER_USER}/numerical-analysis-frontend:latest")
          fi

          echo "backend_uri=${BACKEND_URI}" >> $GITHUB_OUTPUT
          echo "frontend_uri=${FRONTEND_URI}" >> $GITHUB_OUTPUT
          echo "::notice::🔄 Rolling back ${COMPONENT} to tag: ${ROLLBACK_TAG}"
          echo "::notice::Backend image: ${BACKEND_URI}"
          echo "::notice::Frontend image: ${FRONTEND_URI}"

      - name: Terraform Apply (Rollback)
        working-directory: infra
        env:
          TF_VAR_environment_name: production
          TF_VAR_lab_role_arn: ${{ vars.LAB_ROLE_ARN }}
          TF_VAR_vpc_id: ${{ vars.VPC_ID }}
        run: |
          SUBNET_LIST=$(echo "${{ vars.SUBNET_IDS }}" | \
            awk -F',' '{printf "["; for(i=1;i<=NF;i++){printf "\"%s\"%s",$i,(i<NF?",":"")}; printf "]"}')

          terraform apply -auto-approve \
            -var="backend_image_uri=${{ steps.images.outputs.backend_uri }}" \
            -var="frontend_image_uri=${{ steps.images.outputs.frontend_uri }}" \
            -var="subnet_ids=${SUBNET_LIST}"

      - name: Force New ECS Deployment
        run: |
          echo "::notice::🚀 Forcing new ECS deployment for production..."
          aws ecs update-service \
            --cluster numerical-analysis-production-cluster \
            --service numerical-analysis-production-service \
            --force-new-deployment \
            --region us-east-1

      - name: Wait for Service Stability
        run: |
          echo "::notice::⏳ Waiting for ECS service to stabilize..."
          aws ecs wait services-stable \
            --cluster numerical-analysis-production-cluster \
            --services numerical-analysis-production-service \
            --region us-east-1
          echo "::notice::✅ Rollback complete! Service is stable."
