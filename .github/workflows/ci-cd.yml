name: Numerical Analysis Monorepo CI/CD

on:
  push:
    branches:
      - main
      - release
  pull_request:
    branches:
      - main
      - release
  workflow_dispatch:

jobs:
  # -------------------------------------
  # 1. Monorepo Path Filtering
  # -------------------------------------
  path-filter:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci-cd.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci-cd.yml'
            infra:
              - 'infra/**'
              - '.github/workflows/ci-cd.yml'

  # -------------------------------------
  # Job de Backend: Lint y Tests
  # -------------------------------------
  lint-test-backend:
    needs: path-filter
    if: needs.path-filter.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov black pylint flake8 httpx

      - name: Run Black (Formatter)
        run: black backend --check || true

      - name: Run Pylint (Linter)
        run: pylint backend --output-format=text --fail-under=9 > pylint-report.txt || true

      - name: Run Flake8 (Linter)
        run: flake8 backend --output-file=flake8-report.txt || true

      - name: Run Unit Tests with pytest and Coverage
        run: pytest backend/tests --cov=backend --cov-report=xml || true

      - name: Upload Test Reports Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-test-reports
          path: |
            coverage.xml
            pylint-report.txt
            flake8-report.txt
        
  # -------------------------------------
  # Job de Frontend: Lint y Tests
  # -------------------------------------
  lint-test-frontend:
    needs: path-filter
    if: needs.path-filter.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint || true

      - name: Run Vitest with coverage
        working-directory: frontend
        run: npm run test:coverage || true

      - name: Upload Test Reports Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-reports
          path: frontend/coverage/

  # -------------------------------------
  # Consolidación SonarCloud Scan (Monorepo)
  # -------------------------------------
  sonar-scan:
    needs: [path-filter, lint-test-backend, lint-test-frontend]
    if: >
      always() &&
      !cancelled() &&
      (needs.path-filter.outputs.backend == 'true' || needs.path-filter.outputs.frontend == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Backend Reports
        if: needs.path-filter.outputs.backend == 'true'
        uses: actions/download-artifact@v4
        with:
          name: python-test-reports

      - name: Setup Node.js
        if: needs.path-filter.outputs.frontend == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend Dependencies
        if: needs.path-filter.outputs.frontend == 'true'
        working-directory: frontend
        run: npm ci

      - name: Download Frontend Reports
        if: needs.path-filter.outputs.frontend == 'true'
        uses: actions/download-artifact@v4
        with:
          name: frontend-test-reports
          path: frontend/coverage/

      - name: SonarCloud Scan (Backend only)
        if: needs.path-filter.outputs.backend == 'true' && needs.path-filter.outputs.frontend != 'true'
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        with:
          args: >
            -Dsonar.projectKey=mahoyos_Numerical-Analysis
            -Dsonar.organization=mahoyos
            -Dsonar.sources=backend
            -Dsonar.tests=backend/tests
            -Dsonar.exclusions=backend/__init__.py,**/.github/**,backend/.coverage,**/node_modules/**,frontend/dist/**
            -Dsonar.test.inclusions=backend/tests/**/*.py
            -Dsonar.python.version=3.12
            -Dsonar.python.pylint.reportPaths=pylint-report.txt
            -Dsonar.python.flake8.reportPaths=flake8-report.txt
            -Dsonar.python.coverage.reportPaths=coverage.xml
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

      - name: SonarCloud Scan (Frontend only)
        if: needs.path-filter.outputs.frontend == 'true' && needs.path-filter.outputs.backend != 'true'
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        with:
          args: >
            -Dsonar.projectKey=mahoyos_Numerical-Analysis
            -Dsonar.organization=mahoyos
            -Dsonar.sources=frontend/src
            -Dsonar.tests=frontend/tests,frontend/cypress/e2e
            -Dsonar.exclusions=**/node_modules/**,frontend/dist/**,**/.github/**,backend/.coverage
            -Dsonar.test.inclusions=frontend/tests/**/*.ts,frontend/cypress/e2e/**/*.ts
            -Dsonar.coverage.exclusions=frontend/src/main.ts,frontend/src/components/ChartSolution.vue,frontend/src/components/LineGraph.vue,frontend/src/components/InterpolationGraph.vue
            -Dsonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

      - name: SonarCloud Scan (Backend + Frontend)
        if: needs.path-filter.outputs.backend == 'true' && needs.path-filter.outputs.frontend == 'true'
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        with:
          args: >
            -Dsonar.projectKey=mahoyos_Numerical-Analysis
            -Dsonar.organization=mahoyos
            -Dsonar.sources=backend,frontend/src
            -Dsonar.tests=backend/tests,frontend/tests,frontend/cypress/e2e
            -Dsonar.exclusions=**/node_modules/**,frontend/dist/**,**/.github/**,backend/.coverage
            -Dsonar.test.inclusions=backend/tests/**/*.py,frontend/tests/**/*.ts,frontend/cypress/e2e/**/*.ts
            -Dsonar.python.version=3.12
            -Dsonar.qualitygate.wait=true
            -Dsonar.qualitygate.timeout=300
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

  # -------------------------------------
  # Job de IaC Security Scan
  # -------------------------------------
  scan-infra-checkov:
    needs: path-filter
    if: needs.path-filter.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkov IaC Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/
          framework: terraform
          soft_fail: true

  # -------------------------------------
  # Docker Build y Scan: Backend
  # -------------------------------------
  build-push-backend:
    needs: [path-filter, lint-test-backend]
    if: >
      needs.path-filter.outputs.backend == 'true' &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/release')
    runs-on: ubuntu-latest
    outputs:
      repo_name: ${{ steps.set_outputs.outputs.repo_name }}
      image_tag: ${{ steps.set_outputs.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: backend/
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/numerical-analysis-backend:${{ github.sha }}
            ${{ vars.DOCKERHUB_USERNAME }}/numerical-analysis-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ vars.DOCKERHUB_USERNAME }}/numerical-analysis-backend:${{ github.sha }}'
          format: 'table'
          exit-code: '0' 
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Set Job Outputs
        id: set_outputs
        run: |
          echo "repo_name=numerical-analysis-backend" >> $GITHUB_OUTPUT
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

  # -------------------------------------
  # Docker Build y Scan: Frontend
  # -------------------------------------
  build-push-frontend:
    needs: [path-filter, lint-test-frontend]
    if: >
      needs.path-filter.outputs.frontend == 'true' &&
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/release')
    runs-on: ubuntu-latest
    outputs:
      repo_name: ${{ steps.set_outputs.outputs.repo_name }}
      image_tag: ${{ steps.set_outputs.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend/
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/numerical-analysis-frontend:${{ github.sha }}
            ${{ vars.DOCKERHUB_USERNAME }}/numerical-analysis-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner (Frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ vars.DOCKERHUB_USERNAME }}/numerical-analysis-frontend:${{ github.sha }}'
          format: 'table'
          exit-code: '0' 
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Set Job Outputs
        id: set_outputs
        run: |
          echo "repo_name=numerical-analysis-frontend" >> $GITHUB_OUTPUT
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

  # =============================================
  # STAGING DEPLOYMENT (release branch)
  # =============================================
  deploy-tf-staging:
      needs: [build-push-backend, build-push-frontend, scan-infra-checkov, sonar-scan]
      runs-on: ubuntu-latest
      if: |
        always() &&
        !contains(needs.*.result, 'failure') &&
        !contains(needs.*.result, 'cancelled') &&
        github.event_name == 'push'
      outputs:
        alb_url_staging: ${{ steps.get_tf_outputs.outputs.alb_url }}
        cluster_name_staging: "numerical-analysis-staging-cluster"
        service_name_staging: "numerical-analysis-staging-service"
        previous_backend_uri_staging: ${{ steps.capture_previous_images.outputs.previous_backend_uri }}
        previous_frontend_uri_staging: ${{ steps.capture_previous_images.outputs.previous_frontend_uri }}

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Configure AWS Credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }} 
            aws-region: us-east-1

        - name: Ensure Terraform State Bucket
          run: |
            if [ -z "${{ vars.TF_STATE_BUCKET }}" ]; then
              echo "Error: Debes definir la variable del repositorio TF_STATE_BUCKET."
              exit 1
            fi

            if aws s3api head-bucket --bucket "${{ vars.TF_STATE_BUCKET }}" 2>/dev/null; then
              echo "El bucket de estado ya existe."
            else
              echo "Error: El bucket de estado ${{ vars.TF_STATE_BUCKET }} no existe o no es accesible con las credenciales configuradas."
              exit 1
            fi

            aws s3api put-bucket-versioning \
              --bucket "${{ vars.TF_STATE_BUCKET }}" \
              --versioning-configuration Status=Enabled

        - name: Setup Terraform
          uses: hashicorp/setup-terraform@v3
          with:
            terraform_version: "~1.6"
            terraform_wrapper: false 

        - name: Terraform Init (Staging)
          working-directory: infra
          run: |
            terraform init -reconfigure \
              -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
              -backend-config="key=staging/terraform.tfstate" \
              -backend-config="region=us-east-1"

        - name: Capture Previous Image URIs (Staging)
          id: capture_previous_images
          working-directory: infra
          run: |
            PREV_BACKEND_URI=$(terraform state show aws_ecs_task_definition.app 2>/dev/null | grep -o '"[^"]*numerical-analysis-backend:[^"]*"' | tr -d '"' || true)
            PREV_FRONTEND_URI=$(terraform state show aws_ecs_task_definition.app 2>/dev/null | grep -o '"[^"]*numerical-analysis-frontend:[^"]*"' | tr -d '"' || true)

            echo "previous_backend_uri=${PREV_BACKEND_URI}" >> $GITHUB_OUTPUT
            echo "previous_frontend_uri=${PREV_FRONTEND_URI}" >> $GITHUB_OUTPUT

            echo "Previous backend image: ${PREV_BACKEND_URI:-none}"
            echo "Previous frontend image: ${PREV_FRONTEND_URI:-none}"

        - name: Terraform Apply (Staging)
          working-directory: infra
          env:
            TF_VAR_environment_name: staging
            TF_VAR_lab_role_arn: ${{ vars.LAB_ROLE_ARN }}
            TF_VAR_vpc_id: ${{ vars.VPC_ID }}
          run: |
            BACKEND_REPO="${{ needs.build-push-backend.outputs.repo_name || 'numerical-analysis-backend' }}"
            BACKEND_TAG="${{ needs.build-push-backend.outputs.image_tag || 'latest' }}"
            BACKEND_URI="${{ vars.DOCKERHUB_USERNAME }}/${BACKEND_REPO}:${BACKEND_TAG}"

            FRONTEND_REPO="${{ needs.build-push-frontend.outputs.repo_name || 'numerical-analysis-frontend' }}"
            FRONTEND_TAG="${{ needs.build-push-frontend.outputs.image_tag || 'latest' }}"
            FRONTEND_URI="${{ vars.DOCKERHUB_USERNAME }}/${FRONTEND_REPO}:${FRONTEND_TAG}"
            
            echo "Deploying Backend URI: $BACKEND_URI"
            echo "Deploying Frontend URI: $FRONTEND_URI"

            SUBNET_LIST=$(echo "${{ vars.SUBNET_IDS }}" | \
              awk -F',' '{printf "["; for(i=1;i<=NF;i++){printf "\"%s\"%s",$i,(i<NF?",":"")}; printf "]"}')

            terraform apply -auto-approve \
              -var="backend_image_uri=${BACKEND_URI}" \
              -var="frontend_image_uri=${FRONTEND_URI}" \
              -var="subnet_ids=${SUBNET_LIST}"

        - name: Get Terraform Outputs (Staging)
          id: get_tf_outputs
          working-directory: infra
          run: |
            ALB_URL=$(terraform output -raw alb_url)
            echo "alb_url=${ALB_URL}" >> $GITHUB_OUTPUT

  # -------------------------------------
  # Job de Actualización Servicio Staging (ECS)
  # -------------------------------------
  update-service-staging:
      needs: [deploy-tf-staging]
      runs-on: ubuntu-latest
      if: |
        always() &&
        needs.deploy-tf-staging.result == 'success' &&
        github.event_name == 'push'

      steps:
        - name: Configure AWS Credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }} 
            aws-region: us-east-1

        - name: Force New Deployment ECS Service Staging
          run: |
            aws ecs update-service --cluster ${{ needs.deploy-tf-staging.outputs.cluster_name_staging }} \
                                  --service ${{ needs.deploy-tf-staging.outputs.service_name_staging }} \
                                  --force-new-deployment \
                                  --region us-east-1
            aws ecs wait services-stable --cluster ${{ needs.deploy-tf-staging.outputs.cluster_name_staging }} --services ${{ needs.deploy-tf-staging.outputs.service_name_staging }} --region us-east-1

  acceptance-test-staging:
      needs: [deploy-tf-staging, update-service-staging]
      runs-on: ubuntu-latest
      if: |
        always() &&
        needs.update-service-staging.result == 'success' &&
        github.event_name == 'push'

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: '20'
            cache: 'npm'
            cache-dependency-path: frontend/package-lock.json

        - name: Install frontend dependencies
          working-directory: frontend
          run: npm ci

        - name: Run post-deploy acceptance tests (Staging)
          working-directory: frontend
          run: |
            ALB_URL="${{ needs.deploy-tf-staging.outputs.alb_url_staging }}"

            if [ -z "$ALB_URL" ]; then
              echo "::error::ALB URL for staging is empty."
              exit 1
            fi

            echo "Running acceptance tests against: $ALB_URL"
            npx cypress run --e2e --spec cypress/e2e/acceptance.cy.ts --config baseUrl=$ALB_URL

  rollback-staging-on-acceptance-failure:
      needs: [deploy-tf-staging, acceptance-test-staging]
      runs-on: ubuntu-latest
      if: |
        always() &&
        needs.acceptance-test-staging.result == 'failure' &&
        github.event_name == 'push' &&
        (needs.deploy-tf-staging.outputs.previous_backend_uri_staging != '' || needs.deploy-tf-staging.outputs.previous_frontend_uri_staging != '')

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Configure AWS Credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
            aws-region: us-east-1

        - name: Setup Terraform
          uses: hashicorp/setup-terraform@v3
          with:
            terraform_version: "~1.6"
            terraform_wrapper: false

        - name: Terraform Init (Staging Rollback)
          working-directory: infra
          run: |
            terraform init -reconfigure \
              -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
              -backend-config="key=staging/terraform.tfstate" \
              -backend-config="region=us-east-1"

        - name: Terraform Apply Rollback (Staging)
          working-directory: infra
          env:
            TF_VAR_environment_name: staging
            TF_VAR_lab_role_arn: ${{ vars.LAB_ROLE_ARN }}
            TF_VAR_vpc_id: ${{ vars.VPC_ID }}
          run: |
            BACKEND_URI="${{ needs.deploy-tf-staging.outputs.previous_backend_uri_staging }}"
            FRONTEND_URI="${{ needs.deploy-tf-staging.outputs.previous_frontend_uri_staging }}"

            if [ -z "$BACKEND_URI" ] || [ -z "$FRONTEND_URI" ]; then
              echo "::error::Cannot rollback staging. Previous image URIs are missing."
              exit 1
            fi

            SUBNET_LIST=$(echo "${{ vars.SUBNET_IDS }}" | \
              awk -F',' '{printf "["; for(i=1;i<=NF;i++){printf "\"%s\"%s",$i,(i<NF?",":"")}; printf "]"}')

            terraform apply -auto-approve \
              -var="backend_image_uri=${BACKEND_URI}" \
              -var="frontend_image_uri=${FRONTEND_URI}" \
              -var="subnet_ids=${SUBNET_LIST}"

        - name: Wait for ECS Service Stability (Staging Rollback)
          run: |
            aws ecs wait services-stable \
              --cluster ${{ needs.deploy-tf-staging.outputs.cluster_name_staging }} \
              --services ${{ needs.deploy-tf-staging.outputs.service_name_staging }} \
              --region us-east-1

  # =============================================
  # PRODUCTION DEPLOYMENT (main branch)
  # =============================================
  deploy-tf-production:
      needs: [acceptance-test-staging]
      runs-on: ubuntu-latest
      environment: pdn
      if: |
        always() &&
        !contains(needs.*.result, 'failure') &&
        !contains(needs.*.result, 'cancelled') &&
        github.event_name == 'push'
      outputs:
        alb_url_production: ${{ steps.get_tf_outputs.outputs.alb_url }}
        cluster_name_production: "numerical-analysis-production-cluster"
        service_name_production: "numerical-analysis-production-service"
        previous_backend_uri_production: ${{ steps.capture_previous_images.outputs.previous_backend_uri }}
        previous_frontend_uri_production: ${{ steps.capture_previous_images.outputs.previous_frontend_uri }}

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Configure AWS Credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
            aws-region: us-east-1

        - name: Ensure Terraform State Bucket
          run: |
            if [ -z "${{ vars.TF_STATE_BUCKET }}" ]; then
              echo "Error: Debes definir la variable del repositorio TF_STATE_BUCKET."
              exit 1
            fi

            if aws s3api head-bucket --bucket "${{ vars.TF_STATE_BUCKET }}" 2>/dev/null; then
              echo "El bucket de estado ya existe."
            else
              echo "Error: El bucket de estado ${{ vars.TF_STATE_BUCKET }} no existe o no es accesible con las credenciales configuradas."
              exit 1
            fi

            aws s3api put-bucket-versioning \
              --bucket "${{ vars.TF_STATE_BUCKET }}" \
              --versioning-configuration Status=Enabled

        - name: Setup Terraform
          uses: hashicorp/setup-terraform@v3
          with:
            terraform_version: "~1.6"
            terraform_wrapper: false

        - name: Terraform Init (Production)
          working-directory: infra
          run: |
            terraform init -reconfigure \
              -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
              -backend-config="key=production/terraform.tfstate" \
              -backend-config="region=us-east-1"

        - name: Capture Previous Image URIs (Production)
          id: capture_previous_images
          working-directory: infra
          run: |
            PREV_BACKEND_URI=$(terraform state show aws_ecs_task_definition.app 2>/dev/null | grep -o '"[^"]*numerical-analysis-backend:[^"]*"' | tr -d '"' || true)
            PREV_FRONTEND_URI=$(terraform state show aws_ecs_task_definition.app 2>/dev/null | grep -o '"[^"]*numerical-analysis-frontend:[^"]*"' | tr -d '"' || true)

            echo "previous_backend_uri=${PREV_BACKEND_URI}" >> $GITHUB_OUTPUT
            echo "previous_frontend_uri=${PREV_FRONTEND_URI}" >> $GITHUB_OUTPUT

            echo "Previous backend image: ${PREV_BACKEND_URI:-none}"
            echo "Previous frontend image: ${PREV_FRONTEND_URI:-none}"

        - name: Terraform Apply (Production)
          working-directory: infra
          env:
            TF_VAR_environment_name: production
            TF_VAR_lab_role_arn: ${{ vars.LAB_ROLE_ARN }}
            TF_VAR_vpc_id: ${{ vars.VPC_ID }}
          run: |
            BACKEND_REPO="${{ needs.build-push-backend.outputs.repo_name || 'numerical-analysis-backend' }}"
            BACKEND_TAG="${{ needs.build-push-backend.outputs.image_tag || 'latest' }}"
            BACKEND_URI="${{ vars.DOCKERHUB_USERNAME }}/${BACKEND_REPO}:${BACKEND_TAG}"

            FRONTEND_REPO="${{ needs.build-push-frontend.outputs.repo_name || 'numerical-analysis-frontend' }}"
            FRONTEND_TAG="${{ needs.build-push-frontend.outputs.image_tag || 'latest' }}"
            FRONTEND_URI="${{ vars.DOCKERHUB_USERNAME }}/${FRONTEND_REPO}:${FRONTEND_TAG}"

            echo "Deploying Backend URI: $BACKEND_URI"
            echo "Deploying Frontend URI: $FRONTEND_URI"

            SUBNET_LIST=$(echo "${{ vars.SUBNET_IDS }}" | \
              awk -F',' '{printf "["; for(i=1;i<=NF;i++){printf "\"%s\"%s",$i,(i<NF?",":"")}; printf "]"}')

            terraform apply -auto-approve \
              -var="backend_image_uri=${BACKEND_URI}" \
              -var="frontend_image_uri=${FRONTEND_URI}" \
              -var="subnet_ids=${SUBNET_LIST}"

        - name: Get Terraform Outputs (Production)
          id: get_tf_outputs
          working-directory: infra
          run: |
            ALB_URL=$(terraform output -raw alb_url)
            echo "alb_url=${ALB_URL}" >> $GITHUB_OUTPUT

  # -------------------------------------
  # Job de Actualización Servicio Production (ECS)
  # -------------------------------------
  update-service-production:
      needs: [deploy-tf-production]
      runs-on: ubuntu-latest
      if: |
        always() &&
        needs.deploy-tf-production.result == 'success' &&
        github.event_name == 'push'

      steps:
        - name: Configure AWS Credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
            aws-region: us-east-1

        - name: Force New Deployment ECS Service Production
          run: |
            aws ecs update-service --cluster ${{ needs.deploy-tf-production.outputs.cluster_name_production }} \
                                  --service ${{ needs.deploy-tf-production.outputs.service_name_production }} \
                                  --force-new-deployment \
                                  --region us-east-1
            aws ecs wait services-stable --cluster ${{ needs.deploy-tf-production.outputs.cluster_name_production }} --services ${{ needs.deploy-tf-production.outputs.service_name_production }} --region us-east-1

  smoke-test-production:
      needs: [deploy-tf-production, update-service-production]
      runs-on: ubuntu-latest
      if: |
        always() &&
        needs.update-service-production.result == 'success' &&
        github.event_name == 'push'

      steps:
        - name: Run post-deploy smoke checks (Production)
          run: |
            ALB_URL="${{ needs.deploy-tf-production.outputs.alb_url_production }}"

            if [ -z "$ALB_URL" ]; then
              echo "::error::ALB URL for production is empty."
              exit 1
            fi

            echo "Smoke check frontend on: $ALB_URL"
            curl -fsS --retry 6 --retry-delay 10 --retry-all-errors "$ALB_URL" > /dev/null

            echo "Smoke check backend health through frontend proxy: ${ALB_URL}api/health"
            curl -fsS --retry 6 --retry-delay 10 --retry-all-errors "${ALB_URL}api/health" | grep -q '"status":"ok"'

  rollback-production-on-smoke-failure:
      needs: [deploy-tf-production, smoke-test-production]
      runs-on: ubuntu-latest
      if: |
        always() &&
        needs.smoke-test-production.result == 'failure' &&
        github.event_name == 'push' &&
        (needs.deploy-tf-production.outputs.previous_backend_uri_production != '' || needs.deploy-tf-production.outputs.previous_frontend_uri_production != '')

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Configure AWS Credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
            aws-region: us-east-1

        - name: Setup Terraform
          uses: hashicorp/setup-terraform@v3
          with:
            terraform_version: "~1.6"
            terraform_wrapper: false

        - name: Terraform Init (Production Rollback)
          working-directory: infra
          run: |
            terraform init -reconfigure \
              -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
              -backend-config="key=production/terraform.tfstate" \
              -backend-config="region=us-east-1"

        - name: Terraform Apply Rollback (Production)
          working-directory: infra
          env:
            TF_VAR_environment_name: production
            TF_VAR_lab_role_arn: ${{ vars.LAB_ROLE_ARN }}
            TF_VAR_vpc_id: ${{ vars.VPC_ID }}
          run: |
            BACKEND_URI="${{ needs.deploy-tf-production.outputs.previous_backend_uri_production }}"
            FRONTEND_URI="${{ needs.deploy-tf-production.outputs.previous_frontend_uri_production }}"

            if [ -z "$BACKEND_URI" ] || [ -z "$FRONTEND_URI" ]; then
              echo "::error::Cannot rollback production. Previous image URIs are missing."
              exit 1
            fi

            SUBNET_LIST=$(echo "${{ vars.SUBNET_IDS }}" | \
              awk -F',' '{printf "["; for(i=1;i<=NF;i++){printf "\"%s\"%s",$i,(i<NF?",":"")}; printf "]"}')

            terraform apply -auto-approve \
              -var="backend_image_uri=${BACKEND_URI}" \
              -var="frontend_image_uri=${FRONTEND_URI}" \
              -var="subnet_ids=${SUBNET_LIST}"

        - name: Wait for ECS Service Stability (Production Rollback)
          run: |
            aws ecs wait services-stable \
              --cluster ${{ needs.deploy-tf-production.outputs.cluster_name_production }} \
              --services ${{ needs.deploy-tf-production.outputs.service_name_production }} \
              --region us-east-1
