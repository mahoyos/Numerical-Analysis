name: Numerical Analysis Monorepo CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  # -------------------------------------
  # 1. Monorepo Path Filtering (Propuesta 1)
  # -------------------------------------
  path-filter:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
      infra: ${{ steps.filter.outputs.infra }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            backend:
              - 'backend/**'
              - '.github/workflows/ci-cd.yml'
            frontend:
              - 'frontend/**'
              - '.github/workflows/ci-cd.yml'
            infra:
              - 'infra/**'
              - '.github/workflows/ci-cd.yml'

  # -------------------------------------
  # Job de Backend: Lint y Tests
  # -------------------------------------
  lint-test-backend:
    needs: path-filter
    if: needs.path-filter.outputs.backend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov black pylint flake8 httpx

      - name: Run Black (Formatter)
        run: black backend --check || true

      - name: Run Pylint (Linter)
        run: pylint backend --output-format=text --fail-under=9 > pylint-report.txt || true

      - name: Run Flake8 (Linter)
        run: flake8 backend --output-file=flake8-report.txt || true

      - name: Run Unit Tests with pytest and Coverage
        # Ejecuta pruebas en el directorio de backend y genera reporte para Sonar
        run: pytest backend/tests --cov=backend --cov-report=xml || true

      - name: Upload Test Reports Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: python-test-reports
          path: |
            coverage.xml
            pylint-report.txt
            flake8-report.txt
        
  # -------------------------------------
  # Job de Frontend: Lint y Tests
  # -------------------------------------
  lint-test-frontend:
    needs: path-filter
    if: needs.path-filter.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Run ESLint
        working-directory: frontend
        run: npm run lint || true

      - name: Run Vitest with coverage
        working-directory: frontend
        run: npm run test:coverage || true

      - name: Upload Test Reports Artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: frontend-test-reports
          path: frontend/coverage/

  # -------------------------------------
  # Consolidación SonarCloud Scan (Monorepo)
  # -------------------------------------
  sonar-scan:
    needs: [lint-test-backend, lint-test-frontend]
    # Se ejecuta siempre (incluso si los previos fallan o son omitidos por el path filter)
    if: always() && !cancelled()
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necesario para un análisis de historial correcto en SonarQube
          
      - name: Download Backend Reports
        uses: actions/download-artifact@v4
        continue-on-error: true # Permite pasar si el job backend fue omitido
        with:
          name: python-test-reports
          
      - name: Download Frontend Reports
        uses: actions/download-artifact@v4
        continue-on-error: true # Permite pasar si el job frontend fue omitido
        with:
          name: frontend-test-reports
          path: frontend/coverage/
          
      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
  # -------------------------------------
  # Job de IaC Security Scan (Propuesta 4)
  # -------------------------------------
  scan-infra-checkov:
    needs: path-filter
    if: needs.path-filter.outputs.infra == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Checkov IaC Scan
        uses: bridgecrewio/checkov-action@master
        with:
          directory: infra/
          framework: terraform
          soft_fail: true # Cambiar a false si deseas bloquear el despliegue al hallar fallos de seguridad

  # -------------------------------------
  # Docker Build y Scan: Backend (Propuesta 2)
  # -------------------------------------
  build-push-backend:
    needs: [path-filter, lint-test-backend]
    if: needs.path-filter.outputs.backend == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      repo_name: ${{ steps.set_outputs.outputs.repo_name }}
      image_tag: ${{ steps.set_outputs.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Backend image
        uses: docker/build-push-action@v5
        with:
          context: backend/
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/numerical-analysis-backend:${{ github.sha }}
            ${{ vars.DOCKERHUB_USERNAME }}/numerical-analysis-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Escaneo de vulnerabilidades del contenedor ---
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ vars.DOCKERHUB_USERNAME }}/numerical-analysis-backend:${{ github.sha }}'
          format: 'table'
          exit-code: '0' 
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Set Job Outputs
        id: set_outputs
        run: |
          echo "repo_name=numerical-analysis-backend" >> $GITHUB_OUTPUT
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

  # -------------------------------------
  # Docker Build y Scan: Frontend
  # -------------------------------------
  build-push-frontend:
    needs: [path-filter]
    if: needs.path-filter.outputs.frontend == 'true' && github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      repo_name: ${{ steps.set_outputs.outputs.repo_name }}
      image_tag: ${{ steps.set_outputs.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Frontend image
        uses: docker/build-push-action@v5
        with:
          context: frontend/
          file: frontend/Dockerfile
          push: true
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/numerical-analysis-frontend:${{ github.sha }}
            ${{ vars.DOCKERHUB_USERNAME }}/numerical-analysis-frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run Trivy vulnerability scanner (Frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ vars.DOCKERHUB_USERNAME }}/numerical-analysis-frontend:${{ github.sha }}'
          format: 'table'
          exit-code: '0' 
          ignore-unfixed: true
          vuln-type: 'os,library'
          severity: 'CRITICAL,HIGH'

      - name: Set Job Outputs
        id: set_outputs
        run: |
          echo "repo_name=numerical-analysis-frontend" >> $GITHUB_OUTPUT
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

  # -------------------------------------
  # Job de Despliegue Terraform Staging
  # -------------------------------------
  deploy-tf-staging:
      needs: [build-push-backend, build-push-frontend, scan-infra-checkov]
      runs-on: ubuntu-latest
      if: |
        always() &&
        !contains(needs.*.result, 'failure') &&
        !contains(needs.*.result, 'cancelled') &&
        github.event_name == 'push' && github.ref == 'refs/heads/main'
      outputs:
        alb_url_staging: ${{ steps.get_tf_outputs.outputs.alb_url }}
        cluster_name_staging: "numerical-analysis-staging-cluster"
        service_name_staging: "numerical-analysis-staging-service"

      steps:
        - name: Checkout code
          uses: actions/checkout@v4

        - name: Configure AWS Credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }} 
            aws-region: us-east-1

        - name: Ensure Terraform State Bucket
          run: |
            if [ -z "${{ vars.TF_STATE_BUCKET }}" ]; then
              echo "Error: Debes definir la variable del repositorio TF_STATE_BUCKET."
              exit 1
            fi

            if aws s3api head-bucket --bucket "${{ vars.TF_STATE_BUCKET }}" 2>/dev/null; then
              echo "El bucket de estado ya existe."
            else
              echo "Creando bucket de estado ${{ vars.TF_STATE_BUCKET }}..."
              aws s3api create-bucket --bucket "${{ vars.TF_STATE_BUCKET }}" --region us-east-1
            fi

            aws s3api put-bucket-versioning \
              --bucket "${{ vars.TF_STATE_BUCKET }}" \
              --versioning-configuration Status=Enabled

        - name: Setup Terraform
          uses: hashicorp/setup-terraform@v3
          with:
            terraform_version: "~1.6"
            terraform_wrapper: false 

        - name: Terraform Init (Staging)
          working-directory: infra
          run: |
            terraform init -reconfigure \
              -backend-config="bucket=${{ vars.TF_STATE_BUCKET }}" \
              -backend-config="key=staging/terraform.tfstate" \
              -backend-config="region=us-east-1"

        - name: Terraform Apply (Staging)
          working-directory: infra
          env:
            TF_VAR_environment_name: staging
            TF_VAR_lab_role_arn: ${{ vars.LAB_ROLE_ARN }}
            TF_VAR_vpc_id: ${{ vars.VPC_ID }}
          run: |
            BACKEND_REPO="${{ needs.build-push-backend.outputs.repo_name || 'numerical-analysis-backend' }}"
            BACKEND_TAG="${{ needs.build-push-backend.outputs.image_tag || 'latest' }}"
            BACKEND_URI="${{ vars.DOCKERHUB_USERNAME }}/${BACKEND_REPO}:${BACKEND_TAG}"

            FRONTEND_REPO="${{ needs.build-push-frontend.outputs.repo_name || 'numerical-analysis-frontend' }}"
            FRONTEND_TAG="${{ needs.build-push-frontend.outputs.image_tag || 'latest' }}"
            FRONTEND_URI="${{ vars.DOCKERHUB_USERNAME }}/${FRONTEND_REPO}:${FRONTEND_TAG}"
            
            echo "Deploying Backend URI: $BACKEND_URI"
            echo "Deploying Frontend URI: $FRONTEND_URI"

            SUBNET_LIST=$(echo "${{ vars.SUBNET_IDS }}" | \
              awk -F',' '{printf "["; for(i=1;i<=NF;i++){printf "\"%s\"%s",$i,(i<NF?",":"")}; printf "]"}')

            terraform apply -auto-approve \
              -var="backend_image_uri=${BACKEND_URI}" \
              -var="frontend_image_uri=${FRONTEND_URI}" \
              -var="subnet_ids=${SUBNET_LIST}"

        - name: Get Terraform Outputs (Staging)
          id: get_tf_outputs
          working-directory: infra
          run: |
            ALB_URL=$(terraform output -raw alb_url)
            echo "alb_url=${ALB_URL}" >> $GITHUB_OUTPUT

  # -------------------------------------
  # Job de Actualización Servicio Staging (ECS)
  # -------------------------------------
  update-service-staging:
      needs: [deploy-tf-staging]
      runs-on: ubuntu-latest
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'

      steps:
        - name: Configure AWS Credentials
          uses: aws-actions/configure-aws-credentials@v4
          with:
            aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
            aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }} 
            aws-region: us-east-1

        - name: Force New Deployment ECS Service Staging
          run: |
            aws ecs update-service --cluster ${{ needs.deploy-tf-staging.outputs.cluster_name_staging }} \
                                  --service ${{ needs.deploy-tf-staging.outputs.service_name_staging }} \
                                  --force-new-deployment \
                                  --region us-east-1
            aws ecs wait services-stable --cluster ${{ needs.deploy-tf-staging.outputs.cluster_name_staging }} --services ${{ needs.deploy-tf-staging.outputs.service_name_staging }} --region us-east-1

  # (Se omiten los test de staging y despliegue a PPROD por brevedad de la prueba original)
  # Pero conservamos el flujo completo de Terraform a producción si quisieramos
  # Despliegue Terraform Producción y Update Producción se omiten para limitar verbosidad, 
  # pero su flujo queda arreglado en la integración principal de Terraform.