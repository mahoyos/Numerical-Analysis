[pytest]
addopts = -q --cov=models --cov=routers --cov=services --cov=utils --cov-report=term-missing --cov-report=html --cov-fail-under=90
pythonpath = .
testpaths = tests
markers =
	smoke: fast checks for critical availability and core endpoints
	acceptance: end-to-end API behavior checks for business flows
